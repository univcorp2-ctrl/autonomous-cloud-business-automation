<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Architecture diagram for Custom GPT, GitHub Actions, and Cloudflare automation"><defs><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:16}.cloud{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:18}.git{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:18}.store{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:18}.safe{fill:#fff1f2;stroke:#e11d48;stroke-width:2;rx:18}.t{font-family:Arial,'Noto Sans JP',sans-serif;fill:#0f172a;font-size:18px;font-weight:700}.s{font-family:Arial,'Noto Sans JP',sans-serif;fill:#334155;font-size:13px}.arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#m)}.dash{stroke-dasharray:7 6}.label{font-family:Arial,'Noto Sans JP',sans-serif;fill:#475569;font-size:12px}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs><rect class="bg" width="1280" height="760"/><text x="40" y="48" class="t" style="font-size:26px">Custom GPT driven cloud automation architecture</text><text x="40" y="76" class="s">不動産・物販・投資シミュレーションを、GitHub と Cloudflare 上でテストから本番デプロイまで自動化する標準構成</text><rect x="40" y="130" width="190" height="90" class="box"/><text x="70" y="166" class="t">User</text><text x="70" y="192" class="s">Web / CSV / Excel で確認</text><rect x="285" y="130" width="210" height="90" class="box"/><text x="315" y="166" class="t">Custom GPT</text><text x="315" y="192" class="s">自然言語指示 → Action API</text><rect x="550" y="120" width="240" height="110" class="cloud"/><text x="582" y="160" class="t">Cloudflare Worker</text><text x="582" y="187" class="s">API / Dashboard / Auth</text><text x="582" y="208" class="s">/api/run /api/report /csv</text><rect x="860" y="70" width="170" height="80" class="store"/><text x="900" y="105" class="t">D1</text><text x="890" y="130" class="s">構造化データ</text><rect x="1060" y="70" width="170" height="80" class="store"/><text x="1100" y="105" class="t">R2</text><text x="1080" y="130" class="s">CSV / レポート</text><rect x="860" y="190" width="170" height="80" class="store"/><text x="900" y="225" class="t">Queues</text><text x="880" y="250" class="s">非同期ジョブ</text><rect x="1060" y="190" width="170" height="80" class="store"/><text x="1090" y="225" class="t">Cron</text><text x="1080" y="250" class="s">定期実行</text><rect x="550" y="345" width="240" height="100" class="git"/><text x="585" y="382" class="t">GitHub Repo</text><text x="585" y="409" class="s">コード / 設定 / PR / 履歴</text><rect x="860" y="330" width="250" height="130" class="git"/><text x="895" y="370" class="t">GitHub Actions</text><text x="895" y="397" class="s">Build / Unit Test</text><text x="895" y="418" class="s">Playwright E2E / AI Review</text><text x="895" y="439" class="s">Cloudflare Deploy</text><rect x="60" y="535" width="220" height="90" class="safe"/><text x="90" y="570" class="t">Safety Gates</text><text x="90" y="596" class="s">dryRun / approval / limits</text><rect x="345" y="520" width="250" height="120" class="box"/><text x="375" y="558" class="t">Use Cases</text><text x="375" y="585" class="s">不動産分析・物販候補</text><text x="375" y="607" class="s">株式/暗号資産シミュレーション</text><rect x="670" y="520" width="230" height="120" class="cloud"/><text x="700" y="558" class="t">Dashboard</text><text x="700" y="585" class="s">集計結果 / KPI / 明細</text><text x="700" y="607" class="s">CSV export for Excel</text><rect x="970" y="520" width="230" height="120" class="box"/><text x="1000" y="558" class="t">External APIs</text><text x="1000" y="585" class="s">許諾済みデータソース</text><text x="1000" y="607" class="s">Broker / Exchange API</text><path class="arrow" d="M230 175 H285"/><text x="242" y="160" class="label">指示</text><path class="arrow" d="M495 175 H550"/><text x="500" y="160" class="label">Bearer Auth</text><path class="arrow" d="M790 155 C830 140 835 110 860 110"/><path class="arrow" d="M790 175 C835 180 835 230