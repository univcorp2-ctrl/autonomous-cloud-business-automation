name: CI CD
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - name: Start Worker locally
        run: |
          npm run dev > /tmp/worker.log 2>&1 &
          npx wait-on http://127.0.0.1:8787/api/health --timeout 30000
      - run: npm run test:e2e
        env:
          WORKER_BASE_URL: http://127.0.0.1:8787
      - name: AI review (optional)
        run: npm run ai:review || echo "ai:review skipped (OPENAI_API_KEY not set)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Deploy to Cloudflare (skipped if secrets not set)
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping deploy (add secret to enable)"
            exit 0
          fi
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Production health check
        run: |
          if [ -z "$WORKER_BASE_URL" ]; then
            echo "WORKER_BASE_URL not set — skipping health check"
            exit 0
          fi
          curl --fail --silent --show-error "$WORKER_BASE_URL/api/health"
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
